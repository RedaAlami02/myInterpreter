name: Build Release APK
on:
  push:
    branches: [master]
    paths-ignore:
      - 'cloud_function/**'
      - '**.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > myinterpreter_app/android/app/upload-keystore.jks

      - name: Write key.properties
        run: |
          cat > myinterpreter_app/android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build release APK
        run: cd myinterpreter_app && flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: myinterpreter_app/build/app/outputs/flutter-apk/app-release.apk
