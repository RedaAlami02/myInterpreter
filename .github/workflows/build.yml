name: Build Debug APK
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
      - name: Build debug APK
        run: cd myinterpreter_app && flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: myinterpreter_app/build/app/outputs/flutter-apk/app-debug.apk
